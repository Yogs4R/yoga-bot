name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Reading the changelog configuration and generating the changelog based on commit messages
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: ".github/changelog-config.json"
          mode: "COMMIT" # Generate changelog based on commit messages
          token: ${{ secrets.GITHUB_TOKEN }}

      # Prepare a stable step output for downstream steps (avoids context access issues)
      - name: Prepare Changelog Output
        id: prep_changelog
        run: |
          {
            echo 'changelog<<EOF'
            echo '${{ steps.build_changelog.outputs.changelog }}'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Creating a GitHub release with the generated changelog as the release notes
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.prep_changelog.outputs.changelog }}
          draft: false
          prerelease: false
      
      - name: Send Broadcast via Webhook
        # Use the generated changelog and version to send a POST request to your VM's webhook endpoint
        env:
          VERSION: ${{ github.ref_name }}
          CHANGELOG: ${{ steps.prep_changelog.outputs.changelog }}
          SECRET: ${{ secrets.AUTO_BROADCAST_RELEASE }}
        run: |
          # Make sure to have jq installed to create the JSON payload
          jq -n --arg version "$VERSION" --arg changelog "$CHANGELOG" --arg secret "$SECRET" \
            '{version: $version, changelog: $changelog, secret: $secret}' > payload.json
          
          # Send the POST request to the VM's webhook endpoint
          curl -X POST http://${{ secrets.VM_IP }}:3000/webhook-release \
            -H "Content-Type: application/json" \
            -d @payload.json